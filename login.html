<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Cadet Connection Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/login.css">
</head>
<body class="login-body">

  <div class="login-wrapper">
    <!-- Left Panel -->
    <div class="login-left">
      <div class="login-left-content">
        <div class="login-emblem">
          <i class="fas fa-shield-alt"></i>
        </div>
        <h1>Cadet Connection Portal</h1>
        <p class="login-motto">"Unity and Discipline"</p>
        <p class="login-desc">Official NCC NER Region Digital Platform<br>15th Tripura Bn NCC</p>
        <div class="login-features">
          <div><i class="fas fa-id-card"></i> Digital ID Card</div>
          <div><i class="fas fa-certificate"></i> Certificates</div>
          <div><i class="fas fa-calendar-check"></i> Attendance</div>
          <div><i class="fas fa-campground"></i> Camp Registration</div>
        </div>
      </div>
    </div>

    <!-- Right Panel (Login Form) -->
    <div class="login-right">
      <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>

      <!-- Step 1: Enter Details -->
      <div class="login-form-container" id="step1">
        <div class="login-form-header">
          <h2>Welcome Back</h2>
          <p>Login to your NCC Portal account</p>
        </div>
        <form id="loginForm" onsubmit="sendOTP(event)">
          <div class="form-group">
            <label for="loginId"><i class="fas fa-user"></i> NCC Reg No / Mobile / Email</label>
            <input type="text" id="loginId" placeholder="Enter your NCC Reg No, Mobile or Email" required>
          </div>
          <div class="form-group">
            <label for="role"><i class="fas fa-user-shield"></i> Select Role</label>
            <select id="role" required>
              <option value="" disabled selected>Select your role</option>
              <option value="Cadet">Cadet</option>
              <option value="SUO">SUO (Senior Under Officer)</option>
              <option value="ANO">ANO (Associate NCC Officer)</option>
              <option value="CO">CO (Commanding Officer)</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">
            <i class="fas fa-paper-plane"></i> Send OTP
          </button>
        </form>
      </div>

      <!-- Step 2: OTP Verification -->
      <div class="login-form-container hidden" id="step2">
        <div class="login-form-header">
          <h2>Verify OTP</h2>
          <p id="otpMessage">OTP sent to +91 XXXXX XX789</p>
        </div>
        <form id="otpForm" onsubmit="verifyOTP(event)">
          <div class="otp-inputs">
            <input type="text" maxlength="1" class="otp-box" data-index="0" autocomplete="off">
            <input type="text" maxlength="1" class="otp-box" data-index="1" autocomplete="off">
            <input type="text" maxlength="1" class="otp-box" data-index="2" autocomplete="off">
            <input type="text" maxlength="1" class="otp-box" data-index="3" autocomplete="off">
            <input type="text" maxlength="1" class="otp-box" data-index="4" autocomplete="off">
            <input type="text" maxlength="1" class="otp-box" data-index="5" autocomplete="off">
          </div>
          <div class="otp-timer">
            <span id="timerText">Resend OTP in <strong id="countdown">0:45</strong></span>
            <button type="button" id="resendBtn" class="resend-btn hidden" onclick="resendOTP()">Resend OTP</button>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">
            <i class="fas fa-check-circle"></i> Verify & Login
          </button>
          <button type="button" class="btn btn-outline btn-block mt-2" onclick="goBack()">
            <i class="fas fa-arrow-left"></i> Change Details
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="assets/js/auth.js"></script>
</body>
</html>

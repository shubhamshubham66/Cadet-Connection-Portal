<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battalion Search | Cadet Connection Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/homepage.css">
  <link rel="stylesheet" href="assets/css/search.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="navbar-brand">
        <div class="navbar-brand-text"><h1>Cadet Connection Portal</h1><span>NCC NER Region</span></div>
      </a>
      <div class="nav-menu">
        <a href="index.html" class="nav-link">Home</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="activities.html" class="nav-link">Activities</a>
        <a href="events.html" class="nav-link">Events</a>
        <a href="gallery.html" class="nav-link">Gallery</a>
        <a href="camps.html" class="nav-link">Camps</a>
        <a href="login.html" class="nav-link nav-login-btn">Login</a>
      </div>
      <div class="nav-hamburger"><span></span><span></span><span></span></div>
    </div>
    <div class="mobile-overlay"></div>
  </nav>

  <!-- Search Hero -->
  <section class="search-hero">
    <div class="container">
      <h1 data-aos="fade-up"><i class="fas fa-search"></i> Battalion Search</h1>
      <p data-aos="fade-up" data-aos-delay="100">Search any NER Battalion by Name, Number or State</p>
      <div class="search-bar" data-aos="fade-up" data-aos-delay="200">
        <input type="text" id="searchInput" placeholder="Search Battalion by Name, Number or State..." autocomplete="off">
        <button onclick="searchBattalion()"><i class="fas fa-search"></i></button>
        <div class="search-suggestions" id="suggestions"></div>
      </div>
      <div class="search-filters" data-aos="fade-up" data-aos-delay="300">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="Army">Army</button>
        <button class="filter-btn" data-filter="Navy">Navy</button>
        <button class="filter-btn" data-filter="Air Force">Air Force</button>
      </div>
    </div>
  </section>

  <!-- Search Result -->
  <section class="section" id="searchResult" style="display:none;">
    <div class="container">
      <div class="bn-profile-card" id="bnProfileCard"></div>
    </div>
  </section>

  <!-- All Battalions Grid -->
  <section class="section">
    <div class="container">
      <div class="section-title" data-aos="fade-up">
        <h2>All NER Battalions</h2>
        <p>Click any battalion to view full details</p>
      </div>
      <div class="grid grid-3 bn-search-grid" id="bnGrid" data-aos="fade-up"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2025 Cadet Connection Portal | NCC NER Region</p>
        <p class="jai-hind">Jai Hind!</p>
      </div>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/search.js"></script>
</body>
</html>

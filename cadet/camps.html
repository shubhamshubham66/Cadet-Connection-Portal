<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camps | Cadet Connection Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/cadet.css">
  <style>
    .camp-card{padding:1.5rem;position:relative;}
    .camp-card h4{margin-bottom:0.5rem;}
    .camp-meta{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem;}
    .camp-meta p{margin:0;font-size:0.85rem;color:var(--text-light);display:flex;align-items:center;gap:0.4rem;}
    .camp-meta p i{width:16px;color:var(--primary);}
    .camp-type-badge{display:inline-block;padding:0.2rem 0.7rem;border-radius:20px;font-size:0.7rem;font-weight:700;background:rgba(45,90,39,0.1);color:var(--primary);margin-bottom:0.75rem;}
    .btn{padding:0.6rem 1.2rem;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.85rem;display:inline-flex;align-items:center;gap:0.5rem;transition:all 0.3s;width:100%;}
    .btn-primary{background:var(--primary);color:#fff;justify-content:center;}
    .btn-primary:hover{background:#1e3d1a;}
    .btn-disabled{background:#ccc;color:#666;cursor:not-allowed;justify-content:center;}
    .empty-msg{text-align:center;padding:2rem;color:var(--text-light);font-size:0.9rem;}
    .table-container{background:var(--white);border-radius:var(--radius-lg);overflow-x:auto;box-shadow:var(--shadow);}
    .table-container table{width:100%;border-collapse:collapse;}
    .table-container th,.table-container td{padding:0.7rem 1rem;text-align:left;border-bottom:1px solid var(--border);font-size:0.85rem;}
    .table-container th{background:var(--primary);color:#fff;font-weight:600;}
    .badge{padding:0.2rem 0.6rem;border-radius:20px;font-size:0.72rem;font-weight:600;}
    .badge-green{background:rgba(45,90,39,0.1);color:var(--primary);}
    .badge-yellow{background:rgba(200,169,81,0.2);color:#8a6d1b;}
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);padding:0.75rem 1.5rem;border-radius:8px;color:#fff;font-weight:600;font-size:0.85rem;z-index:9999;opacity:0;transition:opacity 0.3s;}.toast.show{opacity:1;}.toast-success{background:#2d5a27;}.toast-error{background:#dc3545;}
    @media(max-width:768px){.cadet-sidebar{position:fixed;left:-280px;top:0;width:270px;height:100vh;z-index:9999;transition:left 0.3s;}.cadet-sidebar.open{left:0;box-shadow:5px 0 20px rgba(0,0,0,0.3);}.cadet-main{margin-left:0!important;width:100%!important;}.grid-2{grid-template-columns:1fr!important;}}
  </style>
</head>
<body>
  <div class="cadet-wrapper">
    <aside class="cadet-sidebar">
      <div class="sidebar-header"><div class="cadet-avatar"><i class="fas fa-user"></i></div><div class="cadet-name" id="sidebarName">Cadet</div><div class="cadet-rank" id="sidebarRank">NCC Cadet</div></div>
      <nav class="sidebar-menu">
        <a href="dashboard.html"><i class="fas fa-home"></i> My Dashboard</a>
        <a href="profile.html"><i class="fas fa-user-circle"></i> My Profile</a>
        <a href="id-card.html"><i class="fas fa-id-card"></i> My ID Card</a>
        <a href="attendance.html"><i class="fas fa-clipboard-list"></i> My Attendance</a>
        <a href="camps.html" class="active"><i class="fas fa-campground"></i> Camps</a>
        <a href="certificates.html"><i class="fas fa-scroll"></i> My Certificates</a>
        <div class="sidebar-divider" style="border-top:1px solid rgba(255,255,255,0.1);margin:1rem 0;"></div>
        <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </nav>
    </aside>
    <main class="cadet-main">
      <header class="cadet-topbar"><div style="display:flex;align-items:center;gap:1rem;"><button class="sidebar-toggle" onclick="document.querySelector('.cadet-sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button><h2 style="font-size:1.1rem;">Camp Registration</h2></div></header>
      <div class="cadet-content">
        <h3 style="margin-bottom:1rem;"><i class="fas fa-campground" style="color:var(--primary);"></i> Available Camps</h3>
        <div class="grid grid-2 mb-4" id="campsGrid">
          <div class="empty-msg"><i class="fas fa-spinner fa-spin"></i> Loading camps...</div>
        </div>

        <h3 style="margin-bottom:1rem;"><i class="fas fa-clipboard-check" style="color:var(--primary);"></i> My Registered Camps</h3>
        <div class="table-container">
          <table>
            <thead><tr><th>Camp</th><th>Date</th><th>Location</th><th>Status</th></tr></thead>
            <tbody id="myRegsBody">
              <tr><td colspan="4" class="empty-msg">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <div class="toast" id="toast"></div>

  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    var user = requireAuth(['Cadet']);
    if (user) {
      document.getElementById('sidebarName').textContent = user.name || 'Cadet';
      document.getElementById('sidebarRank').textContent = (user.rank || 'Cadet') + ' | ' + (user.battalion || '');
    }

    // Load camps from API
    async function loadCamps() {
      var grid = document.getElementById('campsGrid');
      try {
        var result = await API.getCamps();
        if (result.success && result.camps.length > 0) {
          grid.innerHTML = result.camps.map(function(camp) {
            var startDate = new Date(camp.startDate).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
            var endDate = new Date(camp.endDate).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
            var statusClass = camp.status === 'Upcoming' ? 'badge-green' : camp.status === 'Ongoing' ? 'badge-yellow' : '';
            return '<div class="card camp-card">' +
              '<span class="camp-type-badge">' + (camp.type || 'Camp') + ' | ' + camp.status + '</span>' +
              '<h4>' + camp.name + '</h4>' +
              '<div class="camp-meta">' +
                '<p><i class="fas fa-calendar"></i> ' + startDate + ' - ' + endDate + '</p>' +
                '<p><i class="fas fa-map-marker-alt"></i> ' + camp.location + '</p>' +
                '<p><i class="fas fa-users"></i> ' + camp.totalSeats + ' Seats</p>' +
                '<p><i class="fas fa-building-flag"></i> ' + camp.battalion + '</p>' +
              '</div>' +
              '<button class="btn btn-primary" onclick="registerForCamp(\'' + camp._id + '\',\'' + camp.name.replace(/'/g,"\\'") + '\')"><i class="fas fa-check"></i> Register Now</button>' +
            '</div>';
          }).join('');
        } else {
          grid.innerHTML = '<div class="empty-msg" style="grid-column:1/-1;"><i class="fas fa-campground" style="font-size:2rem;color:#ccc;margin-bottom:0.5rem;display:block;"></i>No camps available for your battalion right now.</div>';
        }
      } catch(e) {
        grid.innerHTML = '<div class="empty-msg" style="grid-column:1/-1;">Unable to load camps. Check your connection.</div>';
      }
    }

    // Register for camp
    async function registerForCamp(campId, campName) {
      if (!user) { showToast('Please login first', 'error'); return; }

      var cadetData = {
        mobile: user.mobile || '',
        email: user.email || '',
        regNo: user.regimentNo || user.regNo || '',
        institute: user.institute || user.college || '',
        rank: user.rank || 'Cadet',
        wing: user.wing || ''
      };

      try {
        var result = await API.registerForCamp(campId, cadetData);
        if (result.success) {
          showToast('Registered for ' + campName + '!', 'success');
          loadMyRegistrations();
        } else {
          showToast(result.message || 'Registration failed', 'error');
        }
      } catch(e) {
        showToast('Server error. Try again.', 'error');
      }
    }

    // Load my registrations
    async function loadMyRegistrations() {
      var tbody = document.getElementById('myRegsBody');
      try {
        var result = await API.getCamps();
        if (result.success && result.camps.length > 0) {
          // For each camp, we don't have a "my registrations" endpoint for cadet
          // So show from localStorage as fallback
          var regs = JSON.parse(localStorage.getItem('camp_registrations') || '[]').filter(function(r) { return r.cadetName === user.name; });
          if (regs.length > 0) {
            tbody.innerHTML = regs.map(function(r) {
              return '<tr><td>' + r.campName + '</td><td>' + r.campDate + '</td><td>' + r.campLocation + '</td><td><span class="badge badge-green">' + r.status + '</span></td></tr>';
            }).join('');
          } else {
            tbody.innerHTML = '<tr><td colspan="4" class="empty-msg">No registrations yet. Register for a camp above!</td></tr>';
          }
        } else {
          tbody.innerHTML = '<tr><td colspan="4" class="empty-msg">No registrations yet.</td></tr>';
        }
      } catch(e) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-msg">Unable to load.</td></tr>';
      }
    }

    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.className = 'toast toast-' + (type || 'success') + ' show';
      t.innerHTML = '<i class="fas fa-' + (type === 'success' ? 'check-circle' : 'times-circle') + '"></i> ' + msg;
      setTimeout(function() { t.classList.remove('show'); }, 3000);
    }

    loadCamps();
    loadMyRegistrations();
  </script>
</body>
</html>
